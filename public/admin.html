<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Admin · NOC Tríade Fibra</title>
<link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <img src="/static/assets/logo-triade-vermelho.png" alt="Tríade">
      <span class="badge">NOC</span>
    </div>

    <nav class="nav">
      <div class="nav-section">Tarefas</div>
      <div class="nav-item active" data-filter="active">
        <svg class="ico" viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
        <span>Ativas</span><span class="count" id="nav-count-active">0</span>
      </div>
      <div class="nav-item" data-filter="in_progress">
        <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Em andamento</span><span class="count" id="nav-count-progress">0</span>
      </div>
      <div class="nav-item" data-filter="done">
        <svg class="ico" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.2-8.55"/><path d="M21 4v5h-5"/></svg>
        <span>Concluídas</span><span class="count" id="nav-count-done">0</span>
      </div>

      <div class="nav-section">TV</div>
      <div class="nav-item" id="nav-preview">
        <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Pré-visualizar</span>
      </div>
    </nav>

    <div class="crew">
      <div class="nav-section" style="margin:0 4px 4px">Plantão agora</div>
      <div class="crew-item"><span class="av on" style="background:#FF6B3D33;color:#FF6B3D">MR</span>Marcos R.</div>
      <div class="crew-item"><span class="av on" style="background:#7BC9FF33;color:#7BC9FF">BM</span>Bia M.</div>
      <div class="crew-item"><span class="av on" style="background:#C58CFF33;color:#C58CFF">DS</span>Diego S.</div>
      <div class="crew-item"><span class="av on" style="background:#5BD6A833;color:#5BD6A8">JT</span>João T.</div>
    </div>
  </aside>

  <!-- List column -->
  <section class="list-col">
    <div class="list-header">
      <div>
        <h1 id="list-title">TAREFAS ATIVAS</h1>
        <div class="sub" id="list-sub">carregando…</div>
      </div>
      <button class="btn-new" id="btn-new">
        <svg class="ico" viewBox="0 0 24 24" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova tarefa
      </button>
    </div>

    <div class="list-toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" placeholder="Buscar tarefa…">
      </div>
      <div class="filter-pills">
        <span class="pill active" data-urgency="all">TODAS</span>
        <span class="pill" data-urgency="overdue">ATRASADAS</span>
        <span class="pill" data-urgency="critical">CRÍTICAS</span>
        <span class="pill" data-urgency="warning">ALERTA</span>
      </div>
    </div>

    <div class="list-rows" id="list-rows"></div>
  </section>

  <!-- Edit panel -->
  <aside class="edit-panel" id="edit-panel">
    <div style="padding:60px 24px;color:var(--fg-3);text-align:center">
      Selecione uma tarefa ou crie uma nova.
    </div>
  </aside>
</div>

<script src="/static/admin.js"></script>
</body>
</html>
