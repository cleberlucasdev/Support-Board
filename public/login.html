<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acesso · Tríade Fibra</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
:root {
  --bg-0: #0A0809; --bg-1: #14110F; --bg-2: #1C1816;
  --line: #2E2825; --fg-1: #F4EFEA; --fg-2: #B8AFA7; --fg-3: #7E7670;
  --brand: #FF1A2A;
}
body {
  background: radial-gradient(ellipse at top, #1A1413 0%, var(--bg-0) 60%) var(--bg-0);
  color: var(--fg-1);
  font-family: 'Inter', system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.card {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px;
  padding: 48px 40px; width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 24px;
}
.logo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.logo img { height: 32px; }
.logo h1 {
  font-family: 'Anton', sans-serif; font-size: 12px; letter-spacing: 0.22em;
  color: var(--fg-3); margin: 0; text-transform: uppercase;
}
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 11px; letter-spacing: 0.14em; color: var(--fg-3); text-transform: uppercase; font-weight: 700; }
.field input {
  background: var(--bg-2); border: 1px solid var(--line); color: var(--fg-1);
  padding: 12px 14px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500;
  outline: none; transition: border-color .15s; letter-spacing: 0.22em;
  caret-color: var(--brand);
}
.field input:focus { border-color: var(--brand); }
.btn-login {
  font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: 0.14em;
  padding: 13px; border-radius: 8px; border: none;
  background: var(--brand); color: white; cursor: pointer;
  text-transform: uppercase; transition: background .15s;
}
.btn-login:hover { background: #FF3A48; }
.btn-login:disabled { opacity: 0.45; cursor: not-allowed; }
.error { font-size: 12px; color: #FF5A47; text-align: center; min-height: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/static/assets/logo-triade-vermelho.png" alt="Tríade Fibra">
    <h1>Central de Suporte</h1>
  </div>
  <div class="field">
    <label>Senha de acesso</label>
    <input type="text" id="pw" autocomplete="off" spellcheck="false" autofocus>
  </div>
  <button class="btn-login" id="btn">Entrar</button>
  <div class="error" id="err"></div>
</div>
<script>
  const next = new URLSearchParams(location.search).get('next') || '/display';
  let realPw = '';
  const pwInput = document.getElementById('pw');

  pwInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { login(); e.preventDefault(); return; }
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    e.preventDefault();
    if (e.key === 'Backspace') {
      realPw = realPw.slice(0, -1);
    } else if (e.key === 'Delete') {
      realPw = '';
    } else if (e.key.length === 1) {
      realPw += e.key;
    }
    pwInput.value = '*'.repeat(realPw.length);
  });

  pwInput.addEventListener('paste', (e) => {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    realPw += pasted;
    pwInput.value = '*'.repeat(realPw.length);
  });

  async function login() {
    if (!realPw) return;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    btn.disabled = true;
    err.textContent = '';
    try {
      const res = await fetch('/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: realPw }),
      });
      if (res.ok) {
        location.href = next;
      } else {
        err.textContent = 'Senha incorreta.';
        realPw = '';
        pwInput.value = '';
        pwInput.focus();
      }
    } catch {
      err.textContent = 'Erro de conexão.';
    }
    btn.disabled = false;
  }

  document.getElementById('btn').addEventListener('click', login);
</script>
</body>
</html>
